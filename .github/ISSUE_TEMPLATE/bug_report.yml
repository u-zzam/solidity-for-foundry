name: Bug report
description: Something is broken or behaves differently from `forge build`
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, and what happened instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension / server version
      placeholder: "0.3.0"
    validations:
      required: true
  - type: input
    id: editor
    attributes:
      label: Editor and OS
      placeholder: "VS Code 1.101 / macOS 15 · Zed 0.192 / Ubuntu 24.04 · …"
    validations:
      required: true
  - type: input
    id: solc
    attributes:
      label: solc version
      placeholder: "0.8.28 (from foundry.toml `solc = …` or the pragma)"
  - type: textarea
    id: forge
    attributes:
      label: What does `forge build` say?
      description: >
        Diagnostics are meant to match `forge build` exactly — if the squiggles
        disagree with it, paste its output for the same file.
  - type: textarea
    id: config
    attributes:
      label: foundry.toml / remappings
      description: >
        Relevant excerpt, if import resolution or project detection is
        involved.
      render: toml
