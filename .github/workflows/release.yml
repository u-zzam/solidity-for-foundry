name: release

# Build the language server for every supported platform from a single tag and
# attach the binaries to a GitHub release. The editor clients download the asset
# matching their platform on activation, so a tag is the only publish step for
# the server itself.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" \
                 --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # GitHub is retiring Intel (macos-13) runners, so cross-compile the
          # x86_64 macOS binary on the Apple-Silicon runner instead.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Native ARM runner: aws-lc-sys (C crypto) does not cross-compile from
          # x86, so the arm64 Linux binary is built on an arm64 host.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked -p solidity-lsp --target ${{ matrix.target }}
      - name: Package and upload (unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="solidity-for-foundry-lsp-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/solidity-for-foundry-lsp" "$asset"
          gh release upload "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --clobber
      - name: Package and upload (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "solidity-for-foundry-lsp-${{ matrix.target }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/solidity-for-foundry-lsp.exe" $asset
          gh release upload "${{ github.ref_name }}" $asset --repo "${{ github.repository }}" --clobber
