name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked

  # The Zed client is not built here: it is excluded from the workspace (wasm
  # target, own toolchain) and the Zed extension registry builds it on publish.
  vscode-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solidity-vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
