name = "Solidity"
grammar = "solidity"
path_suffixes = ["sol"]
line_comments = ["// ", "/// "]
block_comment = ["/* ", " */"]
word_characters = ["$"]
autoclose_before = ";:.,=}])>"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "'", end = "'", close = true, newline = false },
]
